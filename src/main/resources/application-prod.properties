# ==== REQUIRED PRODUCTION SECRETS ====
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${KFARMS_DB_URL:jdbc:postgresql://localhost:5432/kfarms_db}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${KFARMS_DB_USERNAME:kfarms_user}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${KFARMS_DB_PASSWORD:kfarms_pass}}}
kfarms.frontend.base-url=${KFARMS_FRONTEND_BASE_URL:https://kfarms.onrender.com}
kfarms.jwt.secret=${KFARMS_JWT_SECRET}

# ==== PRODUCTION DATABASE / LOGGING ====
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:true}
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BIND:WARN}
logging.level.org.hibernate.type.descriptor.sql=${LOGGING_LEVEL_HIBERNATE_DESCRIPTOR:WARN}
logging.level.org.springframework.data.jpa.domain.support.AuditingEntityListener=${LOGGING_LEVEL_AUDITING:INFO}

# ==== PRODUCTION COOKIES / CORS ====
kfarms.cookie.secure=${KFARMS_COOKIE_SECURE:true}
kfarms.cookie.samesite=${KFARMS_COOKIE_SAMESITE:None}
kfarms.cookie.domain=${KFARMS_COOKIE_DOMAIN:}
server.address=0.0.0.0
server.port=${PORT:8080}
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:${KFARMS_CORS_ALLOWED_ORIGINS:}}
spring.web.cors.allowed-origin-patterns=${SPRING_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:${KFARMS_CORS_ALLOWED_ORIGIN_PATTERNS:}}
spring.web.cors.allowed-methods=${SPRING_WEB_CORS_ALLOWED_METHODS:${KFARMS_CORS_ALLOWED_METHODS:GET,POST,PATCH,PUT,DELETE,OPTIONS}}
spring.web.cors.allowed-headers=${SPRING_WEB_CORS_ALLOWED_HEADERS:${KFARMS_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Tenant-Id,X-Client-Request-Id}}
spring.web.cors.exposed-headers=${SPRING_WEB_CORS_EXPOSED_HEADERS:${KFARMS_CORS_EXPOSED_HEADERS:Set-Cookie}}

# ==== OPTIONAL INTEGRATIONS ====
spring.mail.host=${SPRING_MAIL_HOST:${KFARMS_SMTP_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${KFARMS_SMTP_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${KFARMS_SMTP_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${KFARMS_SMTP_PASSWORD:}}
kfarms.auth.verification.preview-enabled=${KFARMS_AUTH_VERIFICATION_PREVIEW_ENABLED:false}
kfarms.demo.seed-viewer=${KFARMS_DEMO_SEED_VIEWER:false}
kfarms.demo.backfill-history=${KFARMS_DEMO_BACKFILL_HISTORY:false}

# ==== OPERATIONS ====
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=${MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED:true}
management.health.livenessstate.enabled=${MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED:true}
management.health.readinessstate.enabled=${MANAGEMENT_HEALTH_READINESSSTATE_ENABLED:true}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
