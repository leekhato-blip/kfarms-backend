# ==== DATABASE CONFIGURATION ====
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:${KFARMS_DB_URL:jdbc:postgresql://localhost:5432/kfarms_db}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${JDBC_DATABASE_USERNAME:${KFARMS_DB_USERNAME:kfarms_user}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${JDBC_DATABASE_PASSWORD:${KFARMS_DB_PASSWORD:kfarms_pass}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==== JPA & HIBERNATE ====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ==== SERVER CONFIG ====
server.address=0.0.0.0
server.port=${PORT:8080}
kfarms.frontend.base-url=${KFARMS_FRONTEND_BASE_URL:http://localhost:5174}

# ==== JWT ====
kfarms.jwt.secret=${KFARMS_JWT_SECRET:dev-only-change-me-dev-only-change-me-2026}
kfarms.jwt.expiration-ms=${KFARMS_JWT_EXPIRATION_MS:86400000}

# ==== COOKIE ====
kfarms.cookie.secure=${KFARMS_COOKIE_SECURE:false}
kfarms.cookie.samesite=${KFARMS_COOKIE_SAMESITE:Lax}
kfarms.cookie.domain=${KFARMS_COOKIE_DOMAIN:}
kfarms.cookie.max-age-days=${KFARMS_COOKIE_MAX_AGE_DAYS:1}

# ==== CORS ====
spring.web.cors.allowed-origins=${SPRING_WEB_CORS_ALLOWED_ORIGINS:${KFARMS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}}
spring.web.cors.allowed-origin-patterns=${SPRING_WEB_CORS_ALLOWED_ORIGIN_PATTERNS:${KFARMS_CORS_ALLOWED_ORIGIN_PATTERNS:}}
spring.web.cors.allowed-methods=${SPRING_WEB_CORS_ALLOWED_METHODS:${KFARMS_CORS_ALLOWED_METHODS:GET,POST,PATCH,PUT,DELETE,OPTIONS}}
spring.web.cors.allowed-headers=${SPRING_WEB_CORS_ALLOWED_HEADERS:${KFARMS_CORS_ALLOWED_HEADERS:Authorization,Content-Type,X-Tenant-Id,X-Client-Request-Id}}
spring.web.cors.exposed-headers=${SPRING_WEB_CORS_EXPOSED_HEADERS:${KFARMS_CORS_EXPOSED_HEADERS:Set-Cookie}}

# ==== H2 CONSOLE (disabled since we're using Postgres) ====
spring.h2.console.enabled=false

# ==== LOGGING ====
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_HIBERNATE_BIND:TRACE}


logging.level.org.hibernate.type.descriptor.sql=${LOGGING_LEVEL_HIBERNATE_DESCRIPTOR:TRACE}
logging.level.org.springframework.data.jpa.domain.support.AuditingEntityListener=${LOGGING_LEVEL_AUDITING:DEBUG}

# ==== TIME CONFIG ====
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Lagos
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ==== MAILSENDER SMTP ====
spring.mail.host=${SPRING_MAIL_HOST:${KFARMS_SMTP_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${KFARMS_SMTP_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${KFARMS_SMTP_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${KFARMS_SMTP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==== SMS ALERTS ====
kfarms.sms.enabled=${KFARMS_SMS_ENABLED:false}
kfarms.sms.webhook-url=${KFARMS_SMS_WEBHOOK_URL:}
kfarms.sms.api-key=${KFARMS_SMS_API_KEY:}
kfarms.sms.sender=${KFARMS_SMS_SENDER:KFarms}
kfarms.sms.preview-logging-enabled=${KFARMS_SMS_PREVIEW_LOGGING_ENABLED:true}
kfarms.auth.verification.code-length=${KFARMS_AUTH_VERIFICATION_CODE_LENGTH:6}
kfarms.auth.verification.ttl-minutes=${KFARMS_AUTH_VERIFICATION_TTL_MINUTES:15}
kfarms.auth.verification.preview-enabled=${KFARMS_AUTH_VERIFICATION_PREVIEW_ENABLED:true}

# ==== OPEN AI ====
openai.api.key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o-mini}


# ==== CLEAR HIBERNATE CACHE ====
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.open-in-view=false

# ==== FREEZE AI ====
#set to true when money comes inshaAllah
kfarms.ai.enabled=false

# ==== DEMO TEAM SEED ====
kfarms.demo.seed-team=false
kfarms.demo.seed-viewer=${KFARMS_DEMO_SEED_VIEWER:false}
kfarms.demo.backfill-history=${KFARMS_DEMO_BACKFILL_HISTORY:false}

# ==== BILLING: PAYSTACK ====
kfarms.billing.paystack.enabled=${KFARMS_PAYSTACK_ENABLED:false}
kfarms.billing.paystack.base-url=${KFARMS_PAYSTACK_BASE_URL:https://api.paystack.co}
kfarms.billing.paystack.secret-key=${KFARMS_PAYSTACK_SECRET_KEY:}
kfarms.billing.paystack.pro-monthly-plan-code=${KFARMS_PAYSTACK_PRO_MONTHLY_PLAN_CODE:}
