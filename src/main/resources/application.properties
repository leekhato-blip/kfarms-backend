# ==== DATABASE CONFIGURATION ====
spring.datasource.url=jdbc:postgresql://localhost:5432/kfarms_db
spring.datasource.username=kfarms_user
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==== JPA & HIBERNATE ====
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==== SERVER CONFIG ====
server.address=0.0.0.0
server.port=${PORT:8080}
kfarms.frontend.base-url=${KFARMS_FRONTEND_BASE_URL:http://localhost:5173}

# ==== JWT ====
kfarms.jwt.secret=${KFARMS_JWT_SECRET:change-me-in-env}
kfarms.jwt.expiration-ms=86400000

# ==== COOKIE ====
kfarms.cookie.secure=false
kfarms.cookie.samesite=Lax
# kfarms.cookie.domain= (leave empty for localhost)

# ==== CORS ====
 spring.web.cors.allowed-origins=http://localhost:5173
 spring.web.cors.allowed-methods=*

# ==== H2 CONSOLE (disabled since we're using Postgres) ====
spring.h2.console.enabled=false

# ==== LOGGING ====
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


logging.level.org.hibernate.type.descriptor.sql=TRACE
logging.level.org.springframework.data.jpa.domain.support.AuditingEntityListener=DEBUG

# ==== TIME CONFIG ====
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Lagos
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# ==== MAILSENDER SMTP ====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==== OPEN AI ====
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini


# ==== CLEAR HIBERNATE CACHE ====
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.open-in-view=false

# ==== FREEZE AI ====
#set to true when money comes inshaAllah
kfarms.ai.enabled=false

# ==== DEMO TEAM SEED ====
kfarms.demo.seed-team=false

# ==== BILLING: PAYSTACK ====
kfarms.billing.paystack.enabled=${KFARMS_PAYSTACK_ENABLED:false}
kfarms.billing.paystack.base-url=${KFARMS_PAYSTACK_BASE_URL:https://api.paystack.co}
kfarms.billing.paystack.secret-key=${KFARMS_PAYSTACK_SECRET_KEY:}
kfarms.billing.paystack.pro-monthly-plan-code=${KFARMS_PAYSTACK_PRO_MONTHLY_PLAN_CODE:}
